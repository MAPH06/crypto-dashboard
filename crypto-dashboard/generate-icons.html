<!DOCTYPE html>
<html>
<head><title>Icon Generator - run once</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<p id="status">Klik op een link om de icons te downloaden:</p>
<a id="dl192" download="icon-192.png">Download icon-192.png</a><br>
<a id="dl512" download="icon-512.png">Download icon-512.png</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, s, s);

  const pad = s * 0.15;
  const w = s - pad * 2;
  const h = s - pad * 2;

  // Candle 1 (green) - left
  ctx.fillStyle = '#26a641';
  ctx.fillRect(pad + w * 0.1,  pad + h * 0.3,  w * 0.18, h * 0.4);
  ctx.fillRect(pad + w * 0.18, pad + h * 0.15, w * 0.02, h * 0.55);

  // Candle 2 (red) - center
  ctx.fillStyle = '#da3633';
  ctx.fillRect(pad + w * 0.41, pad + h * 0.2,  w * 0.18, h * 0.5);
  ctx.fillRect(pad + w * 0.49, pad + h * 0.05, w * 0.02, h * 0.65);

  // Candle 3 (green) - right
  ctx.fillStyle = '#26a641';
  ctx.fillRect(pad + w * 0.72, pad + h * 0.25, w * 0.18, h * 0.45);
  ctx.fillRect(pad + w * 0.80, pad + h * 0.1,  w * 0.02, h * 0.6);

  // SMA line
  ctx.strokeStyle = '#f85149';
  ctx.lineWidth = s * 0.02;
  ctx.beginPath();
  ctx.moveTo(pad, pad + h * 0.55);
  ctx.bezierCurveTo(pad + w * 0.3, pad + h * 0.65, pad + w * 0.6, pad + h * 0.4, pad + w, pad + h * 0.35);
  ctx.stroke();
}

['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  drawIcon(canvas);
  const link = document.getElementById('dl' + id.replace('c', ''));
  link.href = canvas.toDataURL('image/png');
});
</script>
</body>
</html>
